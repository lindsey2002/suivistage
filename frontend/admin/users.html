<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuiviStage — Utilisateurs</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>

  <div class="dashboard-layout">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon"></div>
        <span>SuiviStage</span>
      </div>
      <div class="sidebar-role"><span>Administrateur</span></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="users.html" class="nav-item active">Utilisateurs</a>
        <a href="stages.html" class="nav-item">Stages</a>
        <a href="affectations.html" class="nav-item">Affectations</a>
        <a href="rapports.html" class="nav-item">Rapports</a>
        <a href="evaluations.html" class="nav-item">Évaluations</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="user-avatar">A</div>
          <div class="sidebar-user-info">
            <span id="user-name">Chargement...</span>
            <span>Administrateur</span>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()">Déconnexion</button>
      </div>
    </aside>

    <main class="main-content">

      <div class="page-header">
        <h1>Utilisateurs</h1>
        <p>Gérez les comptes de la plateforme</p>
      </div>

      <div class="page-topbar">
        <div style="display:flex; gap:8px;">
          <select id="filter-role" class="filter-select" onchange="filterUsers()">
            <option value="">Tous les rôles</option>
            <option value="stagiaire">Stagiaires</option>
            <option value="tuteur">Tuteurs</option>
            <option value="administrateur">Administrateurs</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="openModal()">+ Nouvel utilisateur</button>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Nom</th>
              <th>Email</th>
              <th>Rôle</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-table">
            <tr><td colspan="5" style="text-align:center; color:#64748B;">Chargement...</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- Modal création utilisateur -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Nouvel utilisateur</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group">
        <label>Nom</label>
        <input type="text" id="input-nom" placeholder="Diallo" />
      </div>
      <div class="form-group">
        <label>Prénom</label>
        <input type="text" id="input-prenom" placeholder="Mamadou" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="input-email" placeholder="exemple@email.com" />
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="input-mdp" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label>Confirmation mot de passe</label>
        <input type="password" id="input-mdp-confirm" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label>Rôle</label>
        <select id="input-role">
          <option value="stagiaire">Stagiaire</option>
          <option value="tuteur">Tuteur</option>
          <option value="administrateur">Administrateur</option>
        </select>
      </div>
      <div class="alert alert-error" id="modal-error" style="display:none;"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="createUser()">Créer</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/admin-users.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuiviStage — Rapports</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>

  <div class="dashboard-layout">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon"></div>
        <span>SuiviStage</span>
      </div>
      <div class="sidebar-role"><span>Administrateur</span></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="users.html" class="nav-item">Utilisateurs</a>
        <a href="stages.html" class="nav-item">Stages</a>
        <a href="affectations.html" class="nav-item">Affectations</a>
        <a href="rapports.html" class="nav-item active">Rapports</a>
        <a href="evaluations.html" class="nav-item">Évaluations</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="user-avatar">A</div>
          <div class="sidebar-user-info">
            <span id="user-name">Chargement...</span>
            <span>Administrateur</span>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()">Déconnexion</button>
      </div>
    </aside>

    <main class="main-content">

      <div class="page-header">
        <h1>Rapports</h1>
        <p>Consultez tous les rapports hebdomadaires</p>
      </div>

      <div class="page-topbar">
        <select id="filter-statut" class="filter-select" onchange="filterRapports()">
          <option value="">Tous les statuts</option>
          <option value="en_attente">En attente</option>
          <option value="valide">Validés</option>
          <option value="rejete">Rejetés</option>
          <option value="archive">Archivés</option>
        </select>
        <div></div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Stagiaire</th>
              <th>Stage</th>
              <th>Semaine</th>
              <th>Soumission</th>
              <th>Statut</th>
              <th>Contenu</th>
            </tr>
          </thead>
          <tbody id="rapports-table">
            <tr><td colspan="6" style="text-align:center; color:#64748B;">Chargement...</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- Modal détail rapport -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" style="max-width:600px;">
      <div class="modal-header">
        <h2>Détail du rapport</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="modal-content"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Fermer</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/admin-rapports.js"></script>

</body>
</html>

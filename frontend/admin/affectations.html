<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuiviStage — Affectations</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>

  <div class="dashboard-layout">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon"></div>
        <span>SuiviStage</span>
      </div>
      <div class="sidebar-role"><span>Administrateur</span></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="users.html" class="nav-item">Utilisateurs</a>
        <a href="stages.html" class="nav-item">Stages</a>
        <a href="affectations.html" class="nav-item active">Affectations</a>
        <a href="rapports.html" class="nav-item">Rapports</a>
        <a href="evaluations.html" class="nav-item">Évaluations</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="user-avatar">A</div>
          <div class="sidebar-user-info">
            <span id="user-name">Chargement...</span>
            <span>Administrateur</span>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()">Déconnexion</button>
      </div>
    </aside>

    <main class="main-content">

      <div class="page-header">
        <h1>Affectations</h1>
        <p>Gérez les affectations stagiaires — tuteurs</p>
      </div>

      <div class="page-topbar">
        <div></div>
        <button class="btn btn-primary" onclick="openModal()">+ Nouvelle affectation</button>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Stagiaire</th>
              <th>Tuteur</th>
              <th>Stage</th>
              <th>Date affectation</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="affectations-table">
            <tr><td colspan="5" style="text-align:center; color:#64748B;">Chargement...</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- Modal création affectation -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Nouvelle affectation</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group">
        <label>Stagiaire</label>
        <select id="input-stagiaire"></select>
      </div>
      <div class="form-group">
        <label>Tuteur</label>
        <select id="input-tuteur"></select>
      </div>
      <div class="form-group">
        <label>Stage</label>
        <select id="input-stage"></select>
      </div>
      <div class="alert alert-error" id="modal-error" style="display:none;"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="createAffectation()">Créer</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/admin-affectations.js"></script>

</body>
</html>

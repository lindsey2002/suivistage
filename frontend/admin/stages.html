<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuiviStage — Stages</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>

  <div class="dashboard-layout">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon"></div>
        <span>SuiviStage</span>
      </div>
      <div class="sidebar-role"><span>Administrateur</span></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="users.html" class="nav-item">Utilisateurs</a>
        <a href="stages.html" class="nav-item active">Stages</a>
        <a href="affectations.html" class="nav-item">Affectations</a>
        <a href="rapports.html" class="nav-item">Rapports</a>
        <a href="evaluations.html" class="nav-item">Évaluations</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="user-avatar">A</div>
          <div class="sidebar-user-info">
            <span id="user-name">Chargement...</span>
            <span>Administrateur</span>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()">Déconnexion</button>
      </div>
    </aside>

    <main class="main-content">

      <div class="page-header">
        <h1>Stages</h1>
        <p>Gérez les stages de la plateforme</p>
      </div>

      <div class="page-topbar">
        <div></div>
        <button class="btn btn-primary" onclick="openModal()">+ Nouveau stage</button>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Titre</th>
              <th>Entreprise</th>
              <th>Début</th>
              <th>Fin</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="stages-table">
            <tr><td colspan="5" style="text-align:center; color:#64748B;">Chargement...</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- Modal création/modification stage -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Nouveau stage</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group">
        <label>Titre</label>
        <input type="text" id="input-titre" placeholder="Stage développement web" />
      </div>
      <div class="form-group">
        <label>Entreprise</label>
        <input type="text" id="input-entreprise" placeholder="Tech Dakar SARL" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="input-description" placeholder="Description du stage..."></textarea>
      </div>
      <div class="form-group">
        <label>Date de début</label>
        <input type="date" id="input-debut" />
      </div>
      <div class="form-group">
        <label>Date de fin</label>
        <input type="date" id="input-fin" />
      </div>
      <div class="alert alert-error" id="modal-error" style="display:none;"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" id="btn-save" onclick="saveStage()">Créer</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/admin-stages.js"></script>

</body>
</html>

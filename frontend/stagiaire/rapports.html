<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuiviStage — Mes Rapports</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>

  <div class="dashboard-layout">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon"></div>
        <span>SuiviStage</span>
      </div>
      <div class="sidebar-role"><span>Stagiaire</span></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="rapports.html" class="nav-item active">Mes rapports</a>
        <a href="evaluation.html" class="nav-item">Mon évaluation</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="user-avatar">S</div>
          <div class="sidebar-user-info">
            <span id="user-name">Chargement...</span>
            <span>Stagiaire</span>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()">Déconnexion</button>
      </div>
    </aside>

    <main class="main-content">

      <div class="page-header">
        <h1>Mes rapports</h1>
        <p>Soumettez et suivez vos rapports hebdomadaires</p>
      </div>

      <div class="page-topbar">
        <select id="filter-statut" class="filter-select" onchange="filterRapports()">
          <option value="">Tous les statuts</option>
          <option value="en_attente">En attente</option>
          <option value="valide">Validés</option>
          <option value="rejete">Rejetés</option>
        </select>
        <button class="btn btn-primary" onclick="openCreateModal()">+ Nouveau rapport</button>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Semaine</th>
              <th>Période</th>
              <th>Soumission</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="rapports-table">
            <tr><td colspan="5" style="text-align:center; color:#64748B;">Chargement...</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- Modal création/modification rapport -->
  <div class="modal-overlay" id="modal-create">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-create-title">Nouveau rapport</h2>
        <button class="modal-close" onclick="closeCreateModal()">✕</button>
      </div>
      <div class="form-group">
        <label>Numéro de semaine</label>
        <input type="number" id="input-semaine" min="1" placeholder="1" />
      </div>
      <div class="form-group">
        <label>Date de début</label>
        <input type="date" id="input-debut" />
      </div>
      <div class="form-group">
        <label>Date de fin</label>
        <input type="date" id="input-fin" />
      </div>
      <div class="form-group">
        <label>Contenu du rapport</label>
        <textarea id="input-contenu" rows="5" placeholder="Décrivez vos tâches de la semaine..."></textarea>
      </div>
      <div class="alert alert-error" id="create-error" style="display:none;"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeCreateModal()">Annuler</button>
        <button class="btn btn-primary" id="btn-save" onclick="saveRapport()">Soumettre</button>
      </div>
    </div>
  </div>

  <!-- Modal détail rapport -->
  <div class="modal-overlay" id="modal-detail">
    <div class="modal" style="max-width:600px;">
      <div class="modal-header">
        <h2>Détail du rapport</h2>
        <button class="modal-close" onclick="closeDetailModal()">✕</button>
      </div>
      <div id="detail-content"></div>

      <!-- Section ajout livrable -->
      <div id="livrable-section">
        <hr style="margin:20px 0; border-color:#E2E8F0;" />
        <p style="font-size:14px; font-weight:600; margin-bottom:12px;">Ajouter un livrable</p>
        <div class="form-group">
          <label>Nom</label>
          <input type="text" id="input-livrable-nom" placeholder="Rapport PDF semaine 1" />
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="input-livrable-type">
            <option value="lien">Lien</option>
            <option value="fichier">Fichier</option>
          </select>
        </div>
        <div class="form-group">
          <label>URL ou chemin</label>
          <input type="text" id="input-livrable-url" placeholder="https://..." />
        </div>
        <button class="btn btn-primary" style="width:100%;" onclick="addLivrable()">
          Ajouter le livrable
        </button>
      </div>

      <div class="modal-footer" style="margin-top:16px;">
        <button class="btn btn-secondary" onclick="closeDetailModal()">Fermer</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/stagiaire-rapports.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuiviStage — Mes Stagiaires</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>

  <div class="dashboard-layout">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon"></div>
        <span>SuiviStage</span>
      </div>
      <div class="sidebar-role"><span>Tuteur</span></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="stagiaires.html" class="nav-item active">Mes stagiaires</a>
        <a href="rapports.html" class="nav-item">Rapports</a>
        <a href="evaluations.html" class="nav-item">Évaluations</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="user-avatar">T</div>
          <div class="sidebar-user-info">
            <span id="user-name">Chargement...</span>
            <span>Tuteur</span>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()">Déconnexion</button>
      </div>
    </aside>

    <main class="main-content">

      <div class="page-header">
        <h1>Mes stagiaires</h1>
        <p>Liste de vos stagiaires affectés</p>
      </div>

      <div id="stagiaires-grid" class="stats-grid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));">
        <p style="color:#64748B;">Chargement...</p>
      </div>

    </main>
  </div>

  <!-- Modal évaluation -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Rédiger une évaluation</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group">
        <label>Note (/20)</label>
        <input type="number" id="input-note" min="0" max="20" step="0.5" placeholder="15.5" />
      </div>
      <div class="form-group">
        <label>Appréciation générale</label>
        <textarea id="input-appreciation" placeholder="Appréciation globale du stagiaire..."></textarea>
      </div>
      <div class="form-group">
        <label>Points forts</label>
        <textarea id="input-points-forts" placeholder="Points forts observés..."></textarea>
      </div>
      <div class="form-group">
        <label>Points à améliorer</label>
        <textarea id="input-points-ameliorer" placeholder="Axes d'amélioration..."></textarea>
      </div>
      <div class="alert alert-error" id="modal-error" style="display:none;"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="submitEvaluation()">Enregistrer</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/tuteur-stagiaires.js"></script>

</body>
</html>

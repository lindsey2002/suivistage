<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuiviStage — Rapports</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>

  <div class="dashboard-layout">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon"></div>
        <span>SuiviStage</span>
      </div>
      <div class="sidebar-role"><span>Tuteur</span></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="stagiaires.html" class="nav-item">Mes stagiaires</a>
        <a href="rapports.html" class="nav-item active">Rapports</a>
        <a href="evaluations.html" class="nav-item">Évaluations</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="user-avatar">T</div>
          <div class="sidebar-user-info">
            <span id="user-name">Chargement...</span>
            <span>Tuteur</span>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()">Déconnexion</button>
      </div>
    </aside>

    <main class="main-content">

      <div class="page-header">
        <h1>Rapports</h1>
        <p>Validez les rapports de vos stagiaires</p>
      </div>

      <div class="page-topbar">
        <select id="filter-statut" class="filter-select" onchange="filterRapports()">
          <option value="">Tous les statuts</option>
          <option value="en_attente">En attente</option>
          <option value="valide">Validés</option>
          <option value="rejete">Rejetés</option>
        </select>
        <div></div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Stagiaire</th>
              <th>Semaine</th>
              <th>Période</th>
              <th>Soumission</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="rapports-table">
            <tr><td colspan="6" style="text-align:center; color:#64748B;">Chargement...</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- Modal détail + validation -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" style="max-width:600px;">
      <div class="modal-header">
        <h2>Rapport — <span id="modal-semaine"></span></h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <div id="modal-content"></div>

      <div id="validation-section">
        <hr style="margin: 20px 0; border-color: #E2E8F0;" />
        <p style="font-size:14px; font-weight:600; margin-bottom:12px;">Décision</p>
        <div class="form-group">
          <label>Commentaire (obligatoire si rejet)</label>
          <textarea id="input-commentaire" placeholder="Votre commentaire..."></textarea>
        </div>
        <div class="modal-footer" style="padding:0; margin-top:0;">
          <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
          <button class="btn btn-danger" onclick="validerRapport('rejete')">Rejeter</button>
          <button class="btn btn-success" onclick="validerRapport('valide')">Valider</button>
        </div>
      </div>

      <div id="close-section" style="display:none;">
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Fermer</button>
        </div>
      </div>

    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/tuteur-rapports.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>

  <link rel="stylesheet" href="../css/main.css" />

  <div class="dashboard-layout">

      <div class="sidebar-logo">
        <div class="sidebar-logo-icon"></div>
        <span>SuiviStage</span>
      </div>
      <div class="sidebar-role"><span>Tuteur</span></div>
      <nav class="sidebar-nav">

        <a href="stagiaires.html" class="nav-item">Mes stagiaires</a>
        <a href="rapports.html" class="nav-item">Rapports</a>

      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="user-avatar">T</div>
          <div class="sidebar-user-info">
            <span id="user-name">Chargement...</span>
            <span>Tuteur</span>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()">Déconnexion</button>
      </div>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuiviStage — Connexion</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <div class="auth-page">

    <!-- Côté gauche : illustration -->
    <div class="auth-left">
      <div class="auth-left-content">
        <h2>Bienvenue sur SuiviStage</h2>
        <p>Suivez vos stagiaires, validez leurs rapports et rédigez vos évaluations en toute simplicité.</p>
        <img 
          src="https://undraw.co/illustrations/undraw_agreement_re_d4dv.svg" 
          alt="Illustration suivi de stage"
          class="auth-illustration"
        />
      </div>
    </div>

    <!-- Côté droit : formulaire -->
    <div class="auth-right">
      <div class="auth-card">

        <div class="auth-logo">
          <div class="auth-logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.636 50.636 0 0 0-2.658-.813A59.906 59.906 0 0 1 12 3.493a59.903 59.903 0 0 1 10.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.717 50.717 0 0 1 12 13.489a50.702 50.702 0 0 1 3.741-3.342M6.75 15a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm0 0v-3.675A55.378 55.378 0 0 1 12 8.443m-7.007 11.55A5.981 5.981 0 0 0 6.75 15.75v-1.5" />
            </svg>
          </div>
          <h1>SuiviStage</h1>
          <p>Connectez-vous à votre espace</p>
        </div>

        <div class="alert alert-error" id="alert-error" style="display:none;">
          Identifiants incorrects. Veuillez réessayer.
        </div>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Adresse email</label>
            <input type="email" id="email" placeholder="exemple@email.com" required />
          </div>

          <div class="form-group">
            <label for="mot_de_passe">Mot de passe</label>
            <input type="password" id="mot_de_passe" placeholder="••••••••" required />
          </div>

          <button type="submit" class="auth-submit" id="btn-submit">
            Se connecter
          </button>
        </form>

      </div>
    </div>

  </div>

  <script src="js/auth.js"></script>
</body>
</html>
